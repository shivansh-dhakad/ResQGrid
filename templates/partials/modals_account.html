        </h2>
        <div class="space-y-3 mb-5">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label

              ><input
                type="text"
                id="edit-firstname"

              />
            </div>
            <div>
              <label
                class="block text-caption font-bold text-text-muted uppercase mb-1.5"
                >Last Name</label
              ><input
                type="text"
                id="edit-lastname"
                class="w-full px-4 py-3 rounded-lg border border-border-base text-body-md"
              />
            </div>
          </div>
          <div>
            <label
              class="block text-caption font-bold text-text-muted uppercase mb-1.5"

            ><input

              id="edit-phone"
              class="w-full px-4 py-3 rounded-lg border border-border-base text-body-md"
            />
          </div>
          <div>
            <label
              class="block text-caption font-bold text-text-muted uppercase mb-1.5"
              >City</label
            ><input
              type="text"
              id="edit-city"
              class="w-full px-4 py-3 rounded-lg border border-border-base text-body-md"
            />
          </div>
          <div>
            <label
              class="block text-caption font-bold text-text-muted uppercase mb-1.5"

            ><input

            />

    <!-- Change Password Modal -->
    <div class="modal-overlay" id="change-pass-modal">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <h2 class="text-headline-md text-on-surface font-bold mb-4">
          Change Password
        </h2>
        <div class="space-y-3 mb-5">

            <label
              class="block text-caption font-bold text-text-muted uppercase mb-1.5"

          </div>
          <div>
            <label
              class="block text-caption font-bold text-text-muted uppercase mb-1.5"

            ><input
              type="password"
              placeholder="Min 8 characters"
              class="w-full px-4 py-3 rounded-lg border border-border-base text-body-md"
            />
          </div>
          <div>
            <label
              class="block text-caption font-bold text-text-muted uppercase mb-1.5"

            ><input

              class="w-full px-4 py-3 rounded-lg border border-border-base text-body-md"
            />

          onclick="

    <!-- Chat Modal -->
    <div class="modal-overlay" id="chat-modal">
      <div
        class="modal-sheet"
        style="
          height: 80vh;
          max-height: 600px;
          display: flex;
          flex-direction: column;
        "
      >
        <div class="modal-handle"></div>
        <div
          class="flex items-center justify-between border-b border-border-base pb-3 mb-3"
        >
          <div>
            <h2
              class="text-headline-md text-on-surface font-bold"
              id="chat-title"
            >
              Chat
            </h2>
            <p class="text-caption text-text-muted">
              Emergency In-App Messaging
            </p>
          </div>
          <button
            onclick="closeModal('chat-modal')"
            class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-surface-container-low text-text-muted"
          >
            <span class="material-symbols-outlined text-base">close</span>
          </button>
        </div>

        <!-- Messages Scrollable Body -->
        <div
          id="chat-messages"
          class="flex-1 overflow-y-auto space-y-3 pr-1 mb-4"
          style="min-height: 100px"
        >
          <p class="text-center text-text-muted py-10">No messages yet.</p>
        </div>

        <!-- Input Footer -->
        <div class="flex gap-2 border-t border-border-base pt-3">
          <input
            type="text"
            id="chat-input"
            placeholder="Type a message…"
            class="flex-1 px-4 py-3 rounded-lg border border-border-base text-body-md"
            onkeydown="if (event.key === 'Enter') sendChatMessage();"
          />
          <button
            onclick="sendChatMessage()"
            class="px-5 bg-primary-container text-white rounded-lg text-label-bold font-bold hover:brightness-110 active:scale-95 transition-all"
          >
            Send
          </button>
        </div>
      </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>
