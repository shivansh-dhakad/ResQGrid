    <!-- ════════════ NOTIFICATION PANEL ════════════ -->
    <div id="notif-panel">
      <!-- SOS Alarm Banner (hidden until triggered) -->
      <div id="sos-alarm-banner" style="display:none;" class="flex items-center gap-3 px-4 py-3 bg-red-600 text-white sticky top-0 z-20">
        <span class="material-symbols-outlined animate-pulse text-xl" style="font-variation-settings:'FILL' 1">emergency</span>
        <div class="flex-1">
          <p class="font-bold text-sm leading-tight">🆘 SOS Alert Nearby!</p>
          <p class="text-xs opacity-80">Someone is in immediate danger near you</p>
        </div>
        <button onclick="stopSosAlarm()" class="flex-shrink-0 bg-white/20 hover:bg-white/30 rounded-lg px-3 py-1.5 text-xs font-bold transition-colors">
          Silence
        </button>
      </div>
      <div
        class="flex items-center justify-between px-4 py-4 border-b border-border-base bg-white sticky top-0 z-10"
      >
        <span class="text-headline-md text-on-surface font-bold"
          >Notifications</span
        >
        <button
          onclick="toggleNotif()"
          class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-surface-container-low text-text-muted"
        >
          <span class="material-symbols-outlined text-base">close</span>
        </button>
      </div>
      <div id="notif-list">
        <p class="text-center text-text-muted text-body-md py-8">No notifications yet.</p>
      </div>
    </div>
